# Stack production untuk VPS Debian 11.
#
# DESAIN: dirancang utk VPS 1 vCPU + 2GB RAM.
#
# Profiles (Docker Compose --profile flag):
#   - default (TANPA flag): postgres + backend + frontend + caddy.
#     Cocok utk Modul 1–4. RAM idle ~700MB.
#   - queue: tambah redis + celery-worker + celery-beat.
#     Aktifkan saat Modul 9 (notifikasi & job scheduler) dipasang.
#   - s3:    tambah minio (S3-compatible storage).
#     Aktifkan kalau volume foto banyak. Default pakai filesystem lokal.
#
# Pemakaian:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#   docker compose -f docker-compose.prod.yml --profile queue --env-file .env.prod up -d
#   docker compose -f docker-compose.prod.yml --profile queue --profile s3 --env-file .env.prod up -d
#
# Akses awal: HTTP via IP di port 80 (SITE_ADDRESS=:80, default).
# Setelah punya domain: set SITE_ADDRESS=https://your-domain.tld di .env.prod
# untuk mengaktifkan TLS otomatis (Let's Encrypt) via Caddy.
name: rasmara

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Tuning utk VPS kecil — total memory pakai ~150MB
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=192MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=30
      -c synchronous_commit=on
      -c wal_buffers=2MB
      -c min_wal_size=80MB
      -c max_wal_size=512MB
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: rasmara.settings.prod
    volumes:
      - ./data/backend-static:/app/staticfiles
      - ./data/backend-media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    # 1 worker x 2 threads — cukup utk traffic ringan & RAM kecil.
    # Naikkan via env GUNICORN_WORKERS / GUNICORN_THREADS bila VPS di-upgrade.
    command: >
      gunicorn rasmara.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-1}
      --threads ${GUNICORN_THREADS:-2}
      --timeout 90
      --max-requests 500
      --max-requests-jitter 50
      --access-logfile -
    deploy:
      resources:
        limits:
          memory: 384M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    command: node server.js
    deploy:
      resources:
        limits:
          memory: 256M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@rasmara.local}
    volumes:
      - ./deploy/debian11/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
      # Static & media files — Caddy serve langsung dari filesystem
      - ./data/backend-static:/srv/static:ro
      - ./data/backend-media:/srv/media:ro
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          memory: 64M

  # ============= Optional: queue (profile=queue) =============
  # Aktifkan saat Modul 9 (notifikasi & scheduler) dipasang.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: [queue]
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    deploy:
      resources:
        limits:
          memory: 96M

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    profiles: [queue]
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: rasmara.settings.prod
    volumes:
      - ./data/backend-media:/app/media
    depends_on:
      - backend
      - redis
    command: celery -A rasmara worker -l info --concurrency=1 --max-tasks-per-child=200
    deploy:
      resources:
        limits:
          memory: 256M

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    profiles: [queue]
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: rasmara.settings.prod
    depends_on:
      - backend
      - redis
    command: celery -A rasmara beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    deploy:
      resources:
        limits:
          memory: 128M

  # ============= Optional: S3 storage (profile=s3) =============
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    profiles: [s3]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  minio-init:
    image: minio/mc:latest
    profiles: [s3]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET} || true;
      mc anonymous set download local/${MINIO_BUCKET} || true;
      exit 0;
      "
